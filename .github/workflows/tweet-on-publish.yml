name: Tweet on Article Publish

on:
  push:
    branches: [ main ]
    paths:
      - 'articles/*.html'   # 日本語記事が追加・更新された時
  workflow_dispatch:         # 手動実行にも対応

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 直前のコミットとの差分を取るため

      - name: Detect new article
        id: detect
        run: |
          # 直前のコミットで追加・更新されたHTMLファイルを検出
          NEW_FILE=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- 'articles/*.html' | head -1)
          if [ -z "$NEW_FILE" ]; then
            echo "No new article file detected."
            echo "has_new=false" >> $GITHUB_OUTPUT
          else
            echo "New article: $NEW_FILE"
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "file=$NEW_FILE" >> $GITHUB_OUTPUT
            # ファイルからタイトルを抽出（日本語版）
            TITLE=$(grep -oP '(?<=<title>).*?(?= - TechPulse</title>)' "$NEW_FILE" | head -1)
            if [ -z "$TITLE" ]; then
              TITLE=$(grep -oP '(?<=<h1>).*?(?=</h1>)' "$NEW_FILE" | head -1 | sed 's/<[^>]*>//g')
            fi
            echo "title=$TITLE" >> $GITHUB_OUTPUT
            # URLを構築
            SLUG=$(basename "$NEW_FILE")
            URL="https://studioinstance.github.io/techpulse/articles/$SLUG"
            echo "url=$URL" >> $GITHUB_OUTPUT
            # 英語版タイトルを検出
            EN_FILE="en/$NEW_FILE"
            EN_TITLE=""
            EN_URL=""
            if [ -f "$EN_FILE" ]; then
              EN_TITLE=$(grep -oP '(?<=<title>).*?(?= - TechPulse</title>)' "$EN_FILE" | head -1)
              if [ -z "$EN_TITLE" ]; then
                EN_TITLE=$(grep -oP '(?<=<h1>).*?(?=</h1>)' "$EN_FILE" | head -1 | sed 's/<[^>]*>//g')
              fi
              EN_URL="https://studioinstance.github.io/techpulse/en/articles/$SLUG"
            fi
            echo "en_title=$EN_TITLE" >> $GITHUB_OUTPUT
            echo "en_url=$EN_URL" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.detect.outputs.has_new == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.detect.outputs.has_new == 'true'
        run: npm ci || npm install

      - name: Tweet new article (JP + EN bilingual)
        if: steps.detect.outputs.has_new == 'true'
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          ARTICLE_TITLE: ${{ steps.detect.outputs.title }}
          ARTICLE_URL: ${{ steps.detect.outputs.url }}
          EN_ARTICLE_TITLE: ${{ steps.detect.outputs.en_title }}
          EN_ARTICLE_URL: ${{ steps.detect.outputs.en_url }}
        run: |
          node -e "
          const { TwitterApi } = require('twitter-api-v2');

          const title = process.env.ARTICLE_TITLE || '新しいテック記事';
          const url = process.env.ARTICLE_URL || 'https://studioinstance.github.io/techpulse/blog.html';
          const enTitle = process.env.EN_ARTICLE_TITLE || '';
          const enUrl = process.env.EN_ARTICLE_URL || '';

          // 日英バイリンガルのツイート文を構築
          let tweetText = '📝【新記事公開 / New Article】\n\n';
          tweetText += '🇯🇵 ' + title + '\n';
          tweetText += url + '\n\n';

          if (enTitle && enUrl) {
            tweetText += '🇬🇧 ' + enTitle + '\n';
            tweetText += enUrl + '\n\n';
          }

          tweetText += '#TechPulse #テックブログ #TechBlog #AI #エンジニア';

          // ツイートの280文字制限チェック（URLは23文字扱い）
          console.log('Tweet text (' + tweetText.length + ' chars):\n' + tweetText);

          async function main() {
            const client = new TwitterApi({
              appKey: process.env.TWITTER_API_KEY,
              appSecret: process.env.TWITTER_API_SECRET,
              accessToken: process.env.TWITTER_ACCESS_TOKEN,
              accessSecret: process.env.TWITTER_ACCESS_TOKEN_SECRET,
            });
            try {
              const { data } = await client.readWrite.v2.tweet(tweetText);
              console.log('✅ Bilingual tweet posted!', data.id);
            } catch (err) {
              console.error('❌ Tweet failed:', err);
              process.exit(1);
            }
          }
          main();
          "
